# ─────────────────────────────────────────
# BreatheSafe NG — Target Cities Config
# Phase 1: Abuja, Lagos, Kano, Port Harcourt
# ─────────────────────────────────────────

cities:
  abuja:
    name: Abuja
    state: FCT
    country: Nigeria
    country_code: NG
    latitude: 9.0765
    longitude: 7.3986
    timezone: Africa/Lagos
    openaq_location_ids:
      - 225753 # Abuja station (update with real IDs from OpenAQ)
    industrial_zone: false
    harmattan_risk: high # Oct - Feb
    notes: 'Federal capital. Government presence. NESREA HQ here.'

  lagos:
    name: Lagos
    state: Lagos
    country: Nigeria
    country_code: NG
    latitude: 6.5244
    longitude: 3.3792
    timezone: Africa/Lagos
    openaq_location_ids:
      - 225754 # Lagos station (update with real IDs from OpenAQ)
    industrial_zone: true
    harmattan_risk: moderate
    notes: 'Highest population. Highest pollution. Major commercial hub.'

  kano:
    name: Kano
    state: Kano
    country: Nigeria
    country_code: NG
    latitude: 12.0022
    longitude: 8.5919
    timezone: Africa/Lagos
    openaq_location_ids:
      - 225755 # Kano station (update with real IDs from OpenAQ)
    industrial_zone: true
    harmattan_risk: very_high # Most severe harmattan in Nigeria
    notes: 'Worst AQI in the North. Heavy harmattan + industrial activity.'

  port_harcourt:
    name: Port Harcourt
    state: Rivers
    country: Nigeria
    country_code: NG
    latitude: 4.8156
    longitude: 7.0498
    timezone: Africa/Lagos
    openaq_location_ids:
      - 225756 # PH station (update with real IDs from OpenAQ)
    industrial_zone: true
    harmattan_risk: low # South — less harmattan
    notes: 'Oil industry pollution. Gas flaring unique data signal.'

# ─────────────────────────────────────────
# AQI Thresholds (WHO / EPA Standard)
# ─────────────────────────────────────────
aqi_thresholds:
  good:
    min: 0
    max: 50
    label: Good
    color: '#00e400'
    advice: 'Air quality is satisfactory. Outdoor activities are safe.'

  moderate:
    min: 51
    max: 100
    label: Moderate
    color: '#ffff00'
    advice: 'Acceptable air quality. Sensitive individuals should limit prolonged outdoor exertion.'

  unhealthy_sensitive:
    min: 101
    max: 150
    label: Unhealthy for Sensitive Groups
    color: '#ff7e00'
    advice: 'Children, elderly, and those with respiratory conditions should reduce outdoor activity.'

  unhealthy:
    min: 151
    max: 200
    label: Unhealthy
    color: '#ff0000'
    advice: 'Everyone should reduce prolonged outdoor exertion. Wear a mask if going outside.'

  very_unhealthy:
    min: 201
    max: 300
    label: Very Unhealthy
    color: '#8f3f97'
    advice: 'Health alert. Avoid all outdoor activities. Keep windows closed.'

  hazardous:
    min: 301
    max: 999
    label: Hazardous
    color: '#7e0023'
    advice: 'Emergency conditions. Stay indoors. Seek medical attention if experiencing symptoms.'

# ─────────────────────────────────────────
# Pollutants tracked
# ─────────────────────────────────────────
pollutants:
  - parameter: pm25
    display_name: PM2.5
    unit: µg/m³
    who_daily_limit: 15

  - parameter: pm10
    display_name: PM10
    unit: µg/m³
    who_daily_limit: 45

  - parameter: no2
    display_name: NO₂
    unit: µg/m³
    who_daily_limit: 25

  - parameter: o3
    display_name: O₃
    unit: µg/m³
    who_daily_limit: 100

  - parameter: co
    display_name: CO
    unit: mg/m³
    who_daily_limit: 4

  - parameter: so2
    display_name: SO₂
    unit: µg/m³
    who_daily_limit: 40

# ─────────────────────────────────────────
# Harmattan Season (Oct - Feb, North Nigeria)
# ─────────────────────────────────────────
harmattan_season:
  start_month: 10 # October
  end_month: 2 # February
  high_risk_cities:
    - kano
    - abuja
  moderate_risk_cities:
    - lagos
  notes: 'Harmattan significantly elevates PM10 and PM2.5. Apply seasonal feature flag during this period.'
